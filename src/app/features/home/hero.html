<section class="hero" id="top">
  <app-particle-canvas />

  <div class="container hero-content">
    <p class="greet mono"><span class="prompt">$</span> cat {{ i18n.t().hero.greet }}</p>

    <h1>
      <span class="iam">{{ i18n.t().hero.iAm }}</span><br>
      <span class="name text-gradient">{{ profile.name }}</span>
    </h1>

    <p class="role mono">
      <span class="prompt">&gt;</span>
      <app-typewriter [words]="roleWords()" />
    </p>

    <p class="pitch">{{ i18n.t().hero.pitch }}</p>

    <div class="ctas">
      <a routerLink="/" fragment="projects" class="btn btn-primary" appMagnetic>
        {{ i18n.t().hero.ctaProjects }} <span aria-hidden="true">→</span>
      </a>
      <a [href]="profile.cvUrl" class="btn btn-ghost" appMagnetic download>
        {{ i18n.t().hero.ctaCv }} <span aria-hidden="true">↓</span>
      </a>
    </div>

    <div class="social">
      <a [href]="profile.github" target="_blank" rel="noopener" aria-label="GitHub">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2 0 1.9 1.2 1.9 1.2 1 1.8 2.8 1.3 3.4 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4 18.3 4.3 18.3 4.3c.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.1 0 4.7-2.8 5.7-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3Z"/>
        </svg>
      </a>
      <a [href]="profile.linkedin" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M20.4 20.5h-3.5v-5.6c0-1.3 0-3-1.9-3s-2.1 1.4-2.1 2.9v5.7H9.4V9h3.4v1.6c.5-.9 1.6-1.9 3.4-1.9 3.6 0 4.3 2.4 4.3 5.5v6.3ZM5.3 7.4a2 2 0 1 1 0-4.1 2 2 0 0 1 0 4.1Zm1.8 13.1H3.6V9h3.5v11.5ZM22.2 0H1.7C.8 0 0 .8 0 1.7v20.5c0 1 .8 1.8 1.7 1.8h20.5c1 0 1.8-.8 1.8-1.8V1.7c0-.9-.8-1.7-1.8-1.7Z"/>
        </svg>
      </a>
      <a [href]="'mailto:' + profile.email" aria-label="Email">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/>
          <path d="m3 6 9 7 9-7"/>
        </svg>
      </a>
    </div>
  </div>

  <a routerLink="/" fragment="about" class="scroll-cue mono" aria-hidden="true">
    <span>{{ i18n.t().hero.scroll }}</span>
    <span class="chevron">▾</span>
  </a>
</section>
